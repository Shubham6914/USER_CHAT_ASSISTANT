<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <script>
    (function () {
      try {
        const theme =
          localStorage.getItem("theme") || "light";

        const root = document.documentElement;

        root.classList.remove("light", "dark");
        root.classList.add(theme);
      } catch (e) { }
    })();
  </script>

  <title>NexusAI</title>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
